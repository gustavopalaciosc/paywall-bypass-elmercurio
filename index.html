<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="icon" href="images/elmercurio-icon.png" type="image/x-icon">
  <title>El Mercurio</title>
</head>
<body>
  <header class="page-header">
    <h1 class="page-title">Paywall Bypass Diario <span class="title-newspaper">El Mercurio</span></h1>
  </header>
  <div class="page-body">
    <div class="filters-container">

      
      <div class="input-container">
        <h2 class="section-title">Sección</h2>
        <select 
          class="search-element" 
          name="article-subsections" 
          id="article-subsections"
        >
          <option value="Acciones">Acciones</option>
          <option value="Bonos">Bonos</option>
          <option value="Monedas">Monedas</option>
          <option value="Fondos">Fondos</option>
          <option value="Pensiones">Pensiones</option>
          <option value="Economía">Economía</option>
          <option value="Regulaciones">Regulaciones</option>
          <option value="Impuestos">Impuestos</option>
          <option value="Propiedades">Propiedades</option>
        </select>
      </div>

      <div class="input-container">
        <h2 class="section-title">N° Artículos</h2>
        <input
          id="size-filter"
          type="number"
          min="1"
          max="100"
          value="25"
        >
      </div>
      <div class="input-container">
        <h2 class="section-title">Fecha</h2>
        <input
          id="date-filter"
          type="date"
        >
      </div>
    </div>
    <main id="articles" class="articles-grid" aria-live="polite"></main>
    <p id="articles-status" class="articles-status" role="status"></p>
  </div>
  <footer>

  </footer>
  <script type="module" src="js/scripts.js"></script>
  <script>
    document.getElementById('date-filter').valueAsDate = new Date();
  </script>
</body>
</html>
